<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Dribble Trainer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #stats {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 2;
      z-index: 10;
    }

    #dribble-display {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 12px 20px;
      border-radius: 14px;
      text-align: center;
      z-index: 10;
    }

    #dribble-count {
      font-size: 72px;
      font-weight: bold;
      color: #ff6600;
      line-height: 1;
    }

    #dribble-label {
      font-size: 13px;
      color: #aaa;
      margin-top: 2px;
    }

    #dribble-state {
      font-size: 12px;
      color: #ff6600;
      margin-top: 4px;
    }

    #status-bar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 10;
      white-space: nowrap;
    }

    #startBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ff6600;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 18px 40px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      z-index: 20;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 18px;
      text-align: center;
      z-index: 20;
      display: none;
      background: rgba(0, 0, 0, 0.8);
      padding: 30px;
      border-radius: 16px;
      min-width: 260px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #333;
      border-top-color: #ff6600;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #bounce-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 102, 0, 0.2);
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s;
    }
  </style>
</head>

<body>
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="bounce-flash"></div>

    <div id="stats" style="display:none">
      FPS: <span id="fps">0</span><br>
      Ball: <span id="ballStatus">searching...</span><br>
      vy: <span id="vyEl">0</span><br>
      State: <span id="stateEl">IDLE</span><br>
      Kalman: <span id="kalmanEl">off</span>
    </div>

    <div id="dribble-display" style="display:none">
      <div id="dribble-count">0</div>
      <div id="dribble-label">dribbles</div>
      <div id="dribble-state">IDLE</div>
    </div>

    <div id="status-bar" style="display:none">Loading...</div>
    <button id="startBtn">Tap to Start</button>
    <div id="loading">
      <div class="spinner"></div>
      <div id="loadingText">Loading AI model...<br><small>~15 seconds</small></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fpsEl = document.getElementById('fps');
    const ballStatusEl = document.getElementById('ballStatus');
    const vyEl = document.getElementById('vyEl');
    const stateEl = document.getElementById('stateEl');
    const kalmanEl = document.getElementById('kalmanEl');
    const statusBar = document.getElementById('status-bar');
    const startBtn = document.getElementById('startBtn');
    const statsDiv = document.getElementById('stats');
    const loadingDiv = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const dribbleDisplay = document.getElementById('dribble-display');
    const dribbleCountEl = document.getElementById('dribble-count');
    const dribbleStateEl = document.getElementById('dribble-state');
    const bounceFlash = document.getElementById('bounce-flash');

    // ── Detection config ──
    const INPUT_SIZE = 320;
    const CONF_THRESHOLD = 0.60;
    const FRAME_SKIP = 3;

    // ── Dribble algorithm config ──
    const VEL_THRESHOLD = 0.6;   // px/frame on Kalman velocity
    const COOLDOWN_MS = 200;
    const OCCLUSION_MAX = 15;    // slightly more generous with Kalman prediction
    const STALL_TIMEOUT = 800;

    // ─────────────────────────────────────────────────────────
    // KALMAN FILTER — 2D state [y, vy], 1D measurement [y]
    //
    // State transition:  y(k+1)  = y(k) + vy(k)*dt + 0.5*g*dt²
    //                   vy(k+1) = vy(k) + g*dt
    // (g is gravity in px/frame — tuned so it feels right)
    //
    // Sits BETWEEN raw detection and the state machine.
    // YOLO/color detection is NEVER touched.
    // On frames with no detection: predict-only (Kalman extrapolates).
    // On frames with detection: predict then correct.
    // Output: kf.y and kf.vy fed directly into the state machine.
    // ─────────────────────────────────────────────────────────
    const KF = {
      // State vector [y, vy]
      y: 0,
      vy: 0,

      // Covariance matrix P (2x2, stored as [p00,p01,p10,p11])
      P: [500, 0, 0, 500],

      // Process noise Q — how much we trust physics
      // Higher = filter adapts faster to sudden moves
      Q_y: 2.0,    // position process noise (px²)
      Q_vy: 4.0,    // velocity process noise (px²/frame²)

      // Measurement noise R — how much we trust YOLO
      // Lower = trust detector more, higher = smoother but laggier
      R: 12.0,      // px² — YOLO is fairly accurate, keep low

      // Gravity constant in px/frame (positive = downward in screen coords)
      // At 30fps, a basketball falls ~9px/frame² roughly → tune around 1.5-3.0
      GRAVITY: 2.0,

      initialized: false,

      // Call every frame.  measurement = detected cy in canvas px, or null if no detection.
      update(measurement) {
        const dt = 1; // 1 frame

        if (!this.initialized) {
          if (measurement === null) return null;
          this.y = measurement;
          this.vy = 0;
          this.P = [500, 0, 0, 500];
          this.initialized = true;
          return {y: this.y, vy: this.vy};
        }

        // ── PREDICT ──
        const y_pred = this.y + this.vy * dt + 0.5 * this.GRAVITY * dt * dt;
        const vy_pred = this.vy + this.GRAVITY * dt;

        // P_pred = F*P*F' + Q
        // F = [[1, dt],[0, 1]]
        const p00 = this.P[0] + dt * this.P[2] + dt * (this.P[1] + dt * this.P[3]) + this.Q_y;
        const p01 = this.P[1] + dt * this.P[3];
        const p10 = this.P[2] + dt * this.P[3];
        const p11 = this.P[3] + this.Q_vy;

        if (measurement === null) {
          // Predict-only: advance state, inflate uncertainty
          this.y = y_pred;
          this.vy = vy_pred;
          this.P = [p00, p01, p10, p11];
          return {y: this.y, vy: this.vy, predictOnly: true};
        }

        // ── UPDATE (correction) ──
        // Innovation
        const innov = measurement - y_pred;

        // S = H*P_pred*H' + R  (H = [1,0])
        const S = p00 + this.R;

        // Kalman gain K = P_pred * H' / S
        const K0 = p00 / S;   // gain for y
        const K1 = p10 / S;   // gain for vy

        // Update state
        this.y = y_pred + K0 * innov;
        this.vy = vy_pred + K1 * innov;

        // Update covariance P = (I - K*H) * P_pred
        this.P[0] = (1 - K0) * p00;
        this.P[1] = (1 - K0) * p01;
        this.P[2] = p10 - K1 * p00;
        this.P[3] = p11 - K1 * p10;

        return {y: this.y, vy: this.vy, innov};
      },

      reset() {
        this.initialized = false;
        this.y = 0;
        this.vy = 0;
        this.P = [500, 0, 0, 500];
      }
    };

    // ── Dribble state ──
    let dribbleCount = 0;
    let dsmState = 'IDLE';
    let dribblePeakY = null;
    let dribbleTroughY = null;
    let lastDribbleTime = 0;
    let lastStateChange = 0;
    let occlusionFrames = 0;
    let yHistory = [];

    // Legacy smooth for X only (visual drawing, not counting)
    let smoothX = null;

    // ── Detection state ──
    let session = null;
    let frameCount = 0;
    let lastDetection = null;
    let fps = 0, fpsFrames = 0, fpsStart = performance.now();

    // ─────────────────────────────────────────
    startBtn.addEventListener('click', async () => {
      startBtn.style.display = 'none';
      loadingDiv.style.display = 'block';
      loadingText.innerHTML = 'Starting camera...';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {facingMode: 'user', width: {ideal: 640}, height: {ideal: 480}},
          audio: false
        });
        video.srcObject = stream;
        await video.play();

        loadingText.innerHTML = 'Loading trained model...<br><small>~15 seconds</small>';
        ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/';

        try {
          session = await ort.InferenceSession.create(
            '/best.onnx',
            {executionProviders: ['wasm'], graphOptimizationLevel: 'all'}
          );
          statusBar.textContent = 'Ready — start dribbling!';
        } catch (e) {
          session = 'color_fallback';
          statusBar.textContent = 'Color mode — show orange ball!';
        }

        loadingDiv.style.display = 'none';
        statsDiv.style.display = 'block';
        statusBar.style.display = 'block';
        dribbleDisplay.style.display = 'block';
        requestAnimationFrame(loop);

      } catch (err) {
        loadingText.innerHTML = 'Camera error: ' + err.message;
      }
    });

    // ─────────────────────────────────────────
    // MAIN LOOP
    // ─────────────────────────────────────────
    async function loop() {
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      ctx.save();
      ctx.scale(-1, 1);
      ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
      ctx.restore();

      frameCount++;
      fpsFrames++;
      const now = performance.now();
      if (now - fpsStart >= 1000) {
        fps = fpsFrames;
        fpsEl.textContent = fps;
        fpsFrames = 0;
        fpsStart = now;
      }

      // ── Run YOLO every FRAME_SKIP frames ──
      if (frameCount % FRAME_SKIP === 0) {
        try {
          lastDetection = (session === 'color_fallback')
            ? detectByColor()
            : await detectYOLO();
        } catch (e) {
          lastDetection = detectByColor();
        }
      }

      // ── Feed detection (or null) into Kalman every frame ──
      //    measurement is the raw detected cy, or null on non-detection frames
      //    or when ball is not found
      const measurement = lastDetection ? lastDetection.cy : null;

      if (lastDetection) {
        // Update smoothX visually (EMA, X only — not needed for counting)
        smoothX = smoothX === null
          ? lastDetection.cx
          : 0.45 * lastDetection.cx + 0.55 * smoothX;

        ballStatusEl.textContent = 'DETECTED';
        ballStatusEl.style.color = '#00ff88';
        occlusionFrames = 0;
      } else {
        ballStatusEl.textContent = 'searching...';
        ballStatusEl.style.color = '#ffaa00';
        occlusionFrames++;
      }

      const kfResult = KF.update(measurement);

      if (occlusionFrames > OCCLUSION_MAX) {
        // Ball truly gone — full reset, keep count
        KF.reset();
        smoothX = null;
        dsmState = 'IDLE';
        dribbleStateEl.textContent = 'IDLE';
        stateEl.textContent = 'IDLE';
        occlusionFrames = 0;
      }

      // ── Draw bounding box using Kalman-estimated position + raw detection size ──
      if (kfResult && KF.initialized && lastDetection) {
        const displayDet = {
          cx: smoothX !== null ? smoothX : lastDetection.cx,
          cy: kfResult.y,
          w: lastDetection.w,
          h: lastDetection.h,
          conf: lastDetection.conf
        };
        drawBox(displayDet);
        // Also draw a tiny predicted dot when in occlusion
      } else if (kfResult && KF.initialized && occlusionFrames > 0 && occlusionFrames <= OCCLUSION_MAX) {
        // Predicted position during occlusion — draw ghost dot
        ctx.beginPath();
        ctx.arc(smoothX || canvas.width / 2, kfResult.y, 9, 0, Math.PI * 2);
        ctx.strokeStyle = '#ff6600';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // ── Update kalman debug display ──
      if (kfResult) {
        kalmanEl.textContent = kfResult.predictOnly
          ? 'predicting'
          : 'tracking (innov:' + (kfResult.innov ? kfResult.innov.toFixed(1) : '0') + ')';
      }

      // ── Run state machine every frame using Kalman y and vy ──
      if (KF.initialized) {
        updateStateMachine(KF.y, KF.vy, now);
      }

      requestAnimationFrame(loop);
    }

    // ─────────────────────────────────────────
    // STATE MACHINE — now driven by Kalman vy directly
    // No more raw derivative — Kalman already gives us a smooth velocity
    // ─────────────────────────────────────────
    function updateStateMachine(currentY, currentVy, now) {
      // currentVy is Kalman's estimated velocity — already smooth, no extra EMA needed
      const vy = currentVy;

      vyEl.textContent = vy.toFixed(2);

      yHistory.push({y: currentY, t: now});
      if (yHistory.length > 30) yHistory.shift();

      // Stall self-heal
      if (dsmState !== 'IDLE' && (now - lastStateChange) > STALL_TIMEOUT) {
        dsmState = 'IDLE';
        lastStateChange = now;
      }

      switch (dsmState) {

        case 'IDLE':
          if (vy > VEL_THRESHOLD) {
            dsmState = 'DOWN';
            dribblePeakY = currentY;
            lastStateChange = now;
          } else if (vy < -VEL_THRESHOLD) {
            dsmState = 'UP';
            dribbleTroughY = currentY;
            lastStateChange = now;
          }
          break;

        case 'DOWN':
          if (dribbleTroughY === null || currentY > dribbleTroughY) dribbleTroughY = currentY;
          if (vy < -VEL_THRESHOLD) {
            dsmState = 'UP';
            dribblePeakY = currentY;
            lastStateChange = now;
            break;
          }
          // Retroactive local-min check
          {
            const localMin = findRecentLocalMin(yHistory, 8);
            if (localMin && (now - localMin.t) < 300) {
              dsmState = 'UP';
              dribblePeakY = currentY;
              lastStateChange = now;
            }
          }
          break;

        case 'UP':
          if (dribblePeakY === null || currentY < dribblePeakY) dribblePeakY = currentY;
          if (vy > VEL_THRESHOLD) {
            countDribble(currentY, now);
            dsmState = 'DOWN';
            lastStateChange = now;
            break;
          }
          // Retroactive local-max check
          {
            const localMax = findRecentLocalMax(yHistory, 8);
            if (localMax && (now - localMax.t) < 300) {
              countDribble(currentY, now);
              dsmState = 'DOWN';
              lastStateChange = now;
            }
          }
          break;
      }

      stateEl.textContent = dsmState;
      dribbleStateEl.textContent = dsmState;
    }

    function countDribble(currentY, now) {
      const elapsed = now - lastDribbleTime;
      if (elapsed > COOLDOWN_MS) {
        dribbleCount++;
        dribbleCountEl.textContent = dribbleCount;
        lastDribbleTime = now;
        dribbleTroughY = currentY;
        bounceFlash.style.opacity = '1';
        setTimeout(() => {bounceFlash.style.opacity = '0';}, 80);
        statusBar.textContent = 'Dribble ' + dribbleCount + '!';
        statusBar.style.background = 'rgba(0,160,70,0.85)';
        setTimeout(() => {statusBar.style.background = 'rgba(0,0,0,0.65)';}, 350);
      }
    }

    // ─────────────────────────────────────────
    // LOCAL MIN / MAX HELPERS (unchanged)
    // ─────────────────────────────────────────
    function findRecentLocalMin(history, windowSize) {
      if (history.length < windowSize) return null;
      const recent = history.slice(-windowSize);
      for (let i = 2; i < recent.length - 2; i++) {
        const p2 = recent[i - 2].y, p1 = recent[i - 1].y;
        const c = recent[i].y;
        const n1 = recent[i + 1].y, n2 = recent[i + 2].y;
        if (c > p1 && c > p2 && c > n1 && c > n2) {
          const amp = c - Math.min(p2, n2);
          if (amp > 15) return recent[i];
        }
      }
      return null;
    }

    function findRecentLocalMax(history, windowSize) {
      if (history.length < windowSize) return null;
      const recent = history.slice(-windowSize);
      for (let i = 2; i < recent.length - 2; i++) {
        const p2 = recent[i - 2].y, p1 = recent[i - 1].y;
        const c = recent[i].y;
        const n1 = recent[i + 1].y, n2 = recent[i + 2].y;
        if (c < p1 && c < p2 && c < n1 && c < n2) {
          const amp = Math.max(p2, n2) - c;
          if (amp > 15) return recent[i];
        }
      }
      return null;
    }

    // ─────────────────────────────────────────
    // YOLO DETECTION — completely unchanged
    // ─────────────────────────────────────────
    async function detectYOLO() {
      const off = document.createElement('canvas');
      off.width = INPUT_SIZE; off.height = INPUT_SIZE;
      const offCtx = off.getContext('2d');
      offCtx.save();
      offCtx.scale(-1, 1);
      offCtx.drawImage(video, -INPUT_SIZE, 0, INPUT_SIZE, INPUT_SIZE);
      offCtx.restore();

      const d = offCtx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE).data;
      const t = new Float32Array(3 * INPUT_SIZE * INPUT_SIZE);
      for (let i = 0; i < INPUT_SIZE * INPUT_SIZE; i++) {
        t[i] = d[i * 4] / 255;
        t[i + INPUT_SIZE * INPUT_SIZE] = d[i * 4 + 1] / 255;
        t[i + INPUT_SIZE * INPUT_SIZE * 2] = d[i * 4 + 2] / 255;
      }

      const input = new ort.Tensor('float32', t, [1, 3, INPUT_SIZE, INPUT_SIZE]);
      const results = await session.run({images: input});
      const out = results[Object.keys(results)[0]];
      const data = out.data;
      const numBoxes = out.dims[2];

      let bestConf = CONF_THRESHOLD, bestBox = null;
      for (let i = 0; i < numBoxes; i++) {
        const score = data[4 * numBoxes + i];
        if (score > bestConf) {
          const xc = data[0 * numBoxes + i], yc = data[1 * numBoxes + i];
          const w = data[2 * numBoxes + i], h = data[3 * numBoxes + i];
          if (w > INPUT_SIZE * 0.70 || h > INPUT_SIZE * 0.70) continue;
          if (w < 20 || h < 20) continue;
          const ratio = w / h;
          if (ratio < 0.5 || ratio > 2.0) continue;
          bestConf = score;
          bestBox = {xc, yc, w, h, conf: score};
        }
      }
      if (!bestBox) return null;

      return {
        cx: bestBox.xc * (canvas.width / INPUT_SIZE),
        cy: bestBox.yc * (canvas.height / INPUT_SIZE),
        w: bestBox.w * (canvas.width / INPUT_SIZE),
        h: bestBox.h * (canvas.height / INPUT_SIZE),
        conf: bestBox.conf
      };
    }

    // ─────────────────────────────────────────
    // COLOR FALLBACK — completely unchanged
    // ─────────────────────────────────────────
    function detectByColor() {
      const w = canvas.width, h = canvas.height;
      const d = ctx.getImageData(0, 0, w, h).data;
      let minX = w, minY = h, maxX = 0, maxY = 0, count = 0;
      const step = 4;

      for (let y = 0; y < h; y += step) {
        for (let x = 0; x < w; x += step) {
          const i = (y * w + x) * 4;
          const r = d[i], g = d[i + 1], b = d[i + 2];
          if (r > 160 && g > 60 && g < 160 && b < 80 && r > g * 1.4) {
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
            count++;
          }
        }
      }

      const total = (w * h) / (step * step);
      if (count < total * 0.01 || count > total * 0.5) return null;
      const bw = maxX - minX, bh = maxY - minY;
      if (bw < 30 || bh < 30) return null;
      return {cx: (minX + maxX) / 2, cy: (minY + maxY) / 2, w: bw, h: bh, conf: 0.7};
    }

    // ─────────────────────────────────────────
    // DRAW BOUNDING BOX — unchanged
    // ─────────────────────────────────────────
    function drawBox(det) {
      const x = det.cx - det.w / 2;
      const y = det.cy - det.h / 2;
      ctx.strokeStyle = '#ff6600';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 14;
      ctx.strokeRect(x, y, det.w, det.h);
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(det.cx, det.cy, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#ff6600';
      ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText(
        'BALL ' + (det.conf * 100).toFixed(0) + '%',
        x + 4,
        y > 24 ? y - 8 : y + det.h + 20
      );
    }
  </script>
</body>

</html>
